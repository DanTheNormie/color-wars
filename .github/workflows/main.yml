name: Build and Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch: # This enables the manual "Run" button

jobs:
  # JOB 1: Build the image on a native ARM runner
  build-and-push:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PAT }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/color-wars:latest

  # JOB 2: Deploy to your server via SSH
  deploy:
    needs: build-and-push # The glue! 
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Update Container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/color-wars:latest
            docker stop color-wars || true
            docker rm color-wars || true
            docker run -d --name color-wars -p 1111:1111 ${{ secrets.DOCKER_HUB_USERNAME }}/color-wars:latest
